name: Discord Changelog

on:
  push:
    paths:
      - "CHANGELOG.md"
    branches:
      - main

jobs:
  send-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Discord payload
        id: payload
        shell: bash
        run: |
          TITLE=$(grep -m 1 '^# ' CHANGELOG.md | sed 's/^# //')
          DESCRIPTION=$(tail -n +2 CHANGELOG.md | head -c 4000)
          export TITLE DESCRIPTION
          PAYLOAD=$(python - <<'PY'
          import json, os
          title = os.environ.get("TITLE", "")
          desc = os.environ.get("DESCRIPTION", "")
          payload = {"embeds": [{"title": title, "description": desc, "color": 3447003}]}
          print(json.dumps(payload))
          PY
          )
          echo "payload<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PAYLOAD" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send CHANGELOG.md to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PAYLOAD: ${{ steps.payload.outputs.payload }}
        run: |
          curl -sS -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK"
