name: Discord Changelog

on:
  push:
    paths:
      - "CHANGELOG.md"
    branches:
      - main

jobs:
  send-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read CHANGELOG.md
        id: read_changelog
        run: |
          TITLE=$(grep -m 1 '^# ' CHANGELOG.md | sed 's/^# //')
          DESCRIPTION=$(tail -n +2 CHANGELOG.md | head -c 4000)
          
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESCRIPTION" \
            '{embeds: [{title: $title, description: $desc, color: 3447003}]}')
          
          curl -s -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK"

      - name: Send CHANGELOG.md to Discord
        run: |
          TITLE="${{ steps.read_changelog.outputs.TITLE }}"
          DESCRIPTION="${{ steps.read_changelog.outputs.DESCRIPTION }}"
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESCRIPTION" \
            '{embeds: [{title: $title, description: $desc, color: 3447003}]}')
          curl -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               ${{ secrets.DISCORD_WEBHOOK }}
