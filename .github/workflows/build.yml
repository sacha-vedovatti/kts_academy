name: Build

on:
  push:
    branches: ["**"]
    paths:
      - 'src/**'
  pull_request:
    branches: ["**"]
    paths:
      - 'src/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant exec perm to gradlew
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build
